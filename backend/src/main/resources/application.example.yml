server:
  port: 8080

spring:
  application:
    name: blog-backend
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: CHANGE_ME
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Shanghai

app:
  cors:
    allowed-origins: "http://localhost:5173"
  admin:
    username: admin
    password: ${ADMIN_PASSWORD:123456}
  jwt:
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_FOR_PROD"
    expire-minutes: 10080

# 在线判题 Judge0 CE（可与生产环境分环境配置）
oj:
  judge0:
    base-url: https://ce.judge0.com
    poll-interval-ms: 400
    poll-max-rounds: 80
    rapid-api-key: ""
    rapid-api-host: ""
