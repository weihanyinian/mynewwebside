server:
  port: 8080
  # 小内存机（如 2C2G）建议收紧，避免默认 max≈200 挤占堆外与线程栈
  tomcat:
    threads:
      max: 50
      min-spare: 5
    max-connections: 200
    accept-count: 50
  # 启用 HTTP 响应压缩（API JSON / HTML 等自动 gzip）
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain,text/xml,application/xml
    min-response-size: 1024

spring:
  application:
    name: blog-backend
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: CHANGE_ME
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: existing schema from ddl-auto era
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Shanghai
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 2s

app:
  cors:
    allowed-origins: "http://localhost:5173"
  daily-quotes:
    - "维寒一念，步履不停。"
    - "代码与文字，都是留给自己和访客的路标。"
    - "今日宜：读一页书，写一行诗。"
  bootstrap-admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:}
  bootstrap-admin-sync-on-startup: false
  # 必须通过环境变量注入，勿提交真实密钥
  jwt:
    secret: ${JWT_SECRET:}
    expire-minutes: ${JWT_EXPIRE_MINUTES:10080}
  # 为 true 时需可连 Redis；阅读量先 INCR Redis，定时批量 UPDATE MySQL，减轻热点文章压力
  view-counter:
    redis: ${VIEW_COUNTER_REDIS:false}
    flush-ms: 60000

ai:
  companion:
    # ===== 看板娘 AI（云端 LLM）配置 =====
    enabled: ${AI_COMPANION_ENABLED:false}
    # DeepSeek API BaseURL（OpenAI 兼容）
    base-url: ${AI_COMPANION_BASE_URL:https://api.deepseek.com/v1}
    # DeepSeek 模型名（禁止本地模型）
    model: ${AI_COMPANION_MODEL:deepseek-chat}
    # API Key（必须走环境变量，严禁写死到仓库）
    api-key: ${AI_COMPANION_API_KEY:}
    # 轻量服务器建议限制输入与频率
    max-input-chars: ${AI_COMPANION_MAX_INPUT_CHARS:300}
    rate-limit-per-minute: ${AI_COMPANION_RATE_LIMIT_PER_MINUTE:20}
    timeout-ms: ${AI_COMPANION_TIMEOUT_MS:12000}
    temperature: ${AI_COMPANION_TEMPERATURE:0.65}

# 在线判题 Judge0 CE（可与生产环境分环境配置）
# 本地无 MySQL 时可启用内存库：spring.profiles.active: h2

oj:
  judge0:
    base-url: https://ce.judge0.com
    poll-interval-ms: 400
    poll-max-rounds: 80
    rapid-api-key: ""
    rapid-api-host: ""

# 网易云第三方 Binaryify 类 API（歌单 / 登录 / 播放链接）；可自建部署
netease:
  proxy:
    base-url: ${NETEASE_PROXY_BASE_URL:https://netease-cloud-music-api-five-roan-58.vercel.app}
    default-playlist-id: ${NETEASE_DEFAULT_PLAYLIST_ID:489057279}
  music:
    open:
      enabled: false
      base-url: ${NETEASE_MUSIC_OPEN_BASE_URL:}
      app-id: ${NETEASE_MUSIC_APP_ID:}
      app-secret: ${NETEASE_MUSIC_APP_SECRET:}
      private-key-base64: ${NETEASE_MUSIC_PRIVATE_KEY:}
      public-key-base64: ${NETEASE_MUSIC_PUBLIC_KEY:}
      connect-timeout-ms: 5000
      read-timeout-ms: 20000
      paths:
        search: /api/v1/music/search
        song-url: /api/v1/song/url
        lyric: /api/v1/song/lyric
        recommend-playlists: /api/v1/playlist/recommend
      headers:
        app-id: X-App-Id
        timestamp: X-Timestamp
        nonce: X-Nonce
        signature: X-Signature
      sign:
        # 待签名字符串模板（RSA2 = SHA256withRSA）
        template: "{appId}\n{timestamp}\n{nonce}\n{bodySha256Hex}"
        encrypt-body: false
        aes-key-length: 16

# Actuator 健康检查（生产不暴露详细信息）
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: never
