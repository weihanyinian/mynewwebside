server:
  port: 8080
  # 小内存机（如 2C2G）建议收紧，避免默认 max≈200 挤占堆外与线程栈
  tomcat:
    threads:
      max: 50
      min-spare: 5
    max-connections: 200
    accept-count: 50
  # 启用 HTTP 响应压缩（API JSON / HTML 等自动 gzip）
  compression:
    enabled: true
    mime-types: application/json,text/html,text/plain,text/xml,application/xml
    min-response-size: 1024

spring:
  application:
    name: blog-backend
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: CHANGE_ME
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1
    baseline-description: existing schema from ddl-auto era
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Shanghai
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: 2s
      timeout: 2s

app:
  cors:
    allowed-origins: "http://localhost:5173"
  daily-quotes:
    - "维寒一念，步履不停。"
    - "代码与文字，都是留给自己和访客的路标。"
    - "今日宜：读一页书，写一行诗。"
  bootstrap-admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:}
  bootstrap-admin-sync-on-startup: false
  # 必须通过环境变量注入，勿提交真实密钥
  jwt:
    secret: ${JWT_SECRET:}
    expire-minutes: ${JWT_EXPIRE_MINUTES:10080}
  # 为 true 时需可连 Redis；阅读量先 INCR Redis，定时批量 UPDATE MySQL，减轻热点文章压力
  view-counter:
    redis: ${VIEW_COUNTER_REDIS:false}
    flush-ms: 60000

# 在线判题 Judge0 CE（可与生产环境分环境配置）
# 本地无 MySQL 时可启用内存库：spring.profiles.active: h2

oj:
  judge0:
    base-url: https://ce.judge0.com
    poll-interval-ms: 400
    poll-max-rounds: 80
    rapid-api-key: ""
    rapid-api-host: ""

# Actuator 健康检查（生产不暴露详细信息）
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: never
