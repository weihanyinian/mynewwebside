server:
  port: 8080

spring:
  application:
    name: blog-backend
  datasource:
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: CHANGE_ME
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: Asia/Shanghai

app:
  cors:
    allowed-origins: "http://localhost:5173"
  # 首次启动且数据库中尚无 admin 用户时，用该明文密码创建用户名为 admin 的账号（务必用环境变量注入，勿提交仓库）
  bootstrap-admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:}
  # 为 true 时每次启动都会用上一项覆盖已有 admin 的密码；仅用于本地重置，生产请保持 false
  bootstrap-admin-sync-on-startup: false
  jwt:
    secret: "CHANGE_ME_TO_A_LONG_RANDOM_SECRET_FOR_PROD"
    expire-minutes: 10080

# 在线判题 Judge0 CE（可与生产环境分环境配置）
# 本地无 MySQL 时可启用内存库（需 pom 已含 h2）：
# spring.profiles.active: h2
# 或命令行：mvn spring-boot:run -Dspring-boot.run.profiles=h2

oj:
  judge0:
    base-url: https://ce.judge0.com
    poll-interval-ms: 400
    poll-max-rounds: 80
    rapid-api-key: ""
    rapid-api-host: ""
