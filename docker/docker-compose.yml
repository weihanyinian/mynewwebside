# =============================================
# MyWebSide Docker Compose 编排
# =============================================
services:
  # ------------------- 数据库 -------------------
  mysql:
    image: mysql:8.0
    container_name: mywebside-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-your_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-blog}
      MYSQL_USER: ${MYSQL_USER:-blog_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-blog_password}
    volumes:
      - mysql_data:/var/lib/mysql
      # 挂载 Flyway SQL 迁移脚本
      - ./backend/src/main/resources/db/migration:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------- Redis（可选） -------------------
  redis:
    image: redis:7-alpine
    container_name: mywebside-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ------------------- 后端 Spring Boot -------------------
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: mywebside-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # 数据库连接
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-blog}
      DB_USERNAME: ${MYSQL_USER:-blog_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-blog_password}
      # CORS（允许前端访问）
      CORS_ALLOWED_ORIGINS: "http://localhost:80,http://localhost:5173"
      # JWT（生产环境必须修改！）
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_TO_A_LONG_RANDOM_SECRET}
      ADMIN_INIT_PASSWORD: ${ADMIN_INIT_PASSWORD:-admin123}
      # Redis（无需则设为空或 localhost:6379）
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ------------------- 前端 Nginx -------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
    container_name: mywebside-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# =============================================
# 数据卷声明
# =============================================
volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

# =============================================
# 网络配置
# =============================================
networks:
  default:
    name: mywebside-network
    driver: bridge
