<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no"
    />
    <title>俄罗斯方块</title>
    <link rel="stylesheet" href="../_shared/base.css" />
    <style>
      .wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
      }
      .keys {
        display: grid;
        grid-template-columns: repeat(3, minmax(56px, 1fr));
        gap: 8px;
        max-width: 280px;
        width: 100%;
      }
      .keys .full {
        grid-column: 1 / -1;
      }
    </style>
  </head>
  <body>
    <div class="moyu-game-root wrap">
      <p class="moyu-hint">按钮 / 键盘：左右移动、旋转、软降。画布上快速滑动可移块。</p>
      <canvas class="moyu-canvas" id="cv" width="200" height="400"></canvas>
      <div class="keys" id="keys">
        <button type="button" class="moyu-btn" data-a="left">←</button>
        <button type="button" class="moyu-btn moyu-btn--primary" data-a="rot">旋转</button>
        <button type="button" class="moyu-btn" data-a="right">→</button>
        <button type="button" class="moyu-btn full" data-a="down">下落</button>
      </div>
    </div>
    <script src="../_shared/bridge.js"></script>
    <script src="tetris.js"></script>
  </body>
</html>
